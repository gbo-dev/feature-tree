name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: run tests
        run: go test ./...

      - name: run race tests
        run: go test -race ./...

      - name: run go vet
        run: go vet ./...

      - name: build ft
        run: go build -buildvcs=false ./cmd/ft
